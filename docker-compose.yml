services:
  dosh:
    build: .
    container_name: dosh
    ports:
      - "3000:3000"
    volumes:
      - dosh-data:/data
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_PATH: /data/dosh.db
      LOG_LEVEL: info
      # Change this to a long random string before first run
      # Generate one with: openssl rand -base64 48
      SECRET_KEY: change-me-to-a-long-random-secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/setup/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dosh-data:
    driver: local

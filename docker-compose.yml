services:
  dosh:
    image: grumnuts/dosh:latest
    container_name: dosh
    ports:
      - "3000:3000"
    volumes:
      - dosh-data:/data
    environment:
      # Generate with: openssl rand -base64 48
      SECRET_KEY: change-me-to-a-long-random-secret
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/setup/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dosh-data:
    driver: local

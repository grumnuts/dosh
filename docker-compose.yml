services:
  dosh:
    build: .
    container_name: dosh
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - dosh-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DB_PATH=/data/dosh.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/setup/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dosh-data:
    driver: local
